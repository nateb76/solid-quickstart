<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Valya AI">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#11182e"/>
    </linearGradient>
    <radialGradient id="glow1" cx="85%" cy="0%" r="60%">
      <stop offset="0" stop-color="#b06dff" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#b06dff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0%" cy="10%" r="55%">
      <stop offset="0" stop-color="#6d8bff" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#6d8bff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="copper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c47e58"/>
      <stop offset="0.55" stop-color="#b06848"/>
      <stop offset="1" stop-color="#9c5638"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6d8bff"/>
      <stop offset="0.55" stop-color="#b06dff"/>
      <stop offset="1" stop-color="#38e1c4"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Logo wordmark -->
  <text x="90" y="250" font-family="Georgia, 'Times New Roman', serif" font-size="150"
        letter-spacing="2" fill="url(#copper)">vAI</text>

  <!-- Eyebrow -->
  <text x="96" y="330" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="26" letter-spacing="4" fill="#38e1c4" font-weight="600">
    APPLIED AI &amp; AUTOMATION STUDIO
  </text>

  <!-- Headline -->
  <text x="92" y="420" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="64" font-weight="800" fill="#eef2ff">Valya AI</text>
  <text x="92" y="495" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="36" font-weight="500" fill="#aab3cf">Software that does the busywork for you.</text>

  <!-- URL -->
  <text x="92" y="565" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="28" font-weight="600" fill="#eef2ff">valyaai.us</text>

  <rect x="92" y="585" width="240" height="5" rx="2.5" fill="url(#accent)"/>
</svg>
