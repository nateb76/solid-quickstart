name: vAINavigator
options:
  bundleIdPrefix: com.vaylaai
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
    SWIFT_STRICT_CONCURRENCY: "complete"

packages:
  GoogleMaps:
    url: https://github.com/googlemaps/ios-maps-sdk
    from: 9.0.0
  GooglePlaces:
    url: https://github.com/googlemaps/ios-places-sdk
    from: 9.0.0

targets:
  vAINavigator:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: vAINavigator
        excludes:
          - "Resources/Info.plist"
    resources:
      - vAINavigator/Resources/Assets.xcassets
      - vAINavigator/DesignSystem/MapStyles
    dependencies:
      - package: GoogleMaps
        product: GoogleMaps
      - package: GooglePlaces
        product: GooglePlaces
    info:
      path: vAINavigator/Resources/Info.plist
      properties:
        CFBundleDisplayName: vAI Navigator
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSHealthShareUsageDescription: "vAI Navigator reads your workout data to track progress toward your virtual destinations."
        NSHealthUpdateUsageDescription: "vAI Navigator does not write to Health. This entry is present only for compatibility."
        NSLocationWhenInUseUsageDescription: "Used to show your current location on the map relative to your route."
        UIRequiredDeviceCapabilities:
          - arm64
    entitlements:
      path: vAINavigator/Resources/vAINavigator.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vaylaai.vAINavigator
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: "NO"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "0.1.0"
        SWIFT_EMIT_LOC_STRINGS: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
